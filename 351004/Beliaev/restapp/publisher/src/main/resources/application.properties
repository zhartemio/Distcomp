spring.application.name=publisher
server.port=24110

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/distcomp
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database=postgresql
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=distcomp

# Liquibase
spring.liquibase.change-log=/db/changelog/db.changelog-master.xml
spring.liquibase.default-schema=distcomp
spring.liquibase.liquibase-schema=distcomp

# ----------------- KAFKA SETTINGS -----------------
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=publisher-group

# ???????????? (?????????? ? InTopic)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ?????????????? (?????? ?? OutTopic)
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# ?????? ????????? ??? ???????? JSON ????? ??????? ??????????????
# ????????? ???????? ?????????? ? ?????? ?????? ?????? (????? ?? ???? ????????? ???????)
spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.consumer.properties.spring.json.add.type.headers=false

# ???? ?????????, ? ????? ????? ?????????? ?????????? JSON ? ???? ??????
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.publisher.dto.kafka.KafkaNoteResponse
spring.kafka.consumer.properties.spring.json.trusted.packages=*
# ----------------- REDIS CACHE SETTINGS -----------------
spring.data.redis.host=localhost
spring.data.redis.port=6379