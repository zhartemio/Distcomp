spring.application.name=discussion
# ?? ??????? REST ?????? discussion ?????? ???????? ????????? ?? ????? 24130
server.port=24130

# Cassandra Connection
spring.cassandra.contact-points=localhost
spring.cassandra.port=9042
spring.cassandra.keyspace-name=distcomp
spring.cassandra.local-datacenter=datacenter1

# Liquibase for Cassandra
spring.liquibase.url=jdbc:cassandra://localhost:9042/distcomp
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.default-schema=distcomp

# ----------------- KAFKA SETTINGS -----------------
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=discussion-group

# ???????????? (?????????? ? OutTopic)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ?????????????? (?????? ?? InTopic)
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# ?????? ????????? ??? ???????? JSON
spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.consumer.properties.spring.json.add.type.headers=false

# ???? ?????????, ? ????? ????? ?????????? ?????????? JSON ? ???? ??????
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.discussion.dto.kafka.KafkaNoteRequest
spring.kafka.consumer.properties.spring.json.trusted.packages=*
