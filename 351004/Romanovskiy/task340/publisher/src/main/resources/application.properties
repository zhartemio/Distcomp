# Настройки сервера (согласно ТЗ 320/340)
server.port=24110
# Контекст пути - пуст, т.к. @RequestMapping уже содержит /api/v1.0
server.servlet.context-path=/api/v1.0

# Настройки подключения к PostgreSQL
# ВАЖНО: убедись, что база данных и схема называются distcomp
spring.datasource.url=jdbc:postgresql://localhost:5432/distcomp?currentSchema=distcomp
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Настройки JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Настройка формата даты (ISO8601)
spring.jackson.serialization.write-dates-as-timestamps=false

# Настройка Liquibase для создания таблиц в Postgres
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.default-schema=distcomp

# Настройки Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=publisher-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3