# Настройки сервера (согласно ТЗ 320/330)
server.port=24110
# Вместо spring.mvc.servlet.path используй:
server.servlet.context-path=/api/v1.0

# Настройки подключения к PostgreSQL
# ВАЖНО: убедись, что база данных и схема называются distcomp
spring.datasource.url=jdbc:postgresql://localhost:5432/distcomp?currentSchema=distcomp
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Настройки JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Настройка формата даты (ISO8601)
spring.jackson.serialization.write-dates-as-timestamps=false

# Настройка Liquibase для создания таблиц в Postgres
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.default-schema=distcomp