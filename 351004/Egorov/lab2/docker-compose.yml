version: '3.8'

services:
  postgres:
    image: postgres:17.8-alpine3.22
    container_name: postgres-distcomp
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: distcomp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - distcomp-network

volumes:
  postgres_data:

networks:
  distcomp-network:
    driver: bridge