server.port=24110

spring.docker.compose.file=351002/Abrashin/compose.yaml

# Spring Boot Docker Compose management
spring.docker.compose.lifecycle-management=start-and-stop
spring.cache.type=redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# Jackson configuration
spring.jackson.mapper.allow-coercion-of-scalars=false

# JPA Settings
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

distcomp.cache.ttl=10m
note.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
note.kafka.reply-group-id=${NOTE_KAFKA_REPLY_GROUP_ID:publisher-note-replies}
note.kafka.request-timeout=1s
security.jwt.secret=${SECURITY_JWT_SECRET:distcomp-jwt-secret-key-with-minimum-32-bytes!}
security.jwt.expiration-ms=${SECURITY_JWT_EXPIRATION_MS:3600000}
