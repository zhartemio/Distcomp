server.port=24110

spring.main.web-application-type=servlet

spring.application.name=distcomp-publisher

spring.jackson.default-property-inclusion=non_null

spring.datasource.url=jdbc:postgresql://localhost:5432/distcomp
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=distcomp-publisher-out
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.acks=all

kafka.topic.in=InTopic
kafka.topic.out=OutTopic

spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

app.jwt.secret=9f4e2c8a0b1d3e5f6a7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b
app.jwt.expiration-ms=86400000
