networks:
  kafkanet:
    name: kafkanet

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    networks: [kafkanet]
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    networks: [kafkanet]
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:7-alpine
    networks: [kafkanet]
    ports:
      - "6379:6379"

  cassandra:
    image: cassandra:5.0
    networks: [kafkanet]
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: distcomp-local
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -E '^UN'"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 40s

  cassandra-init:
    image: cassandra:5.0
    networks: [kafkanet]
    depends_on:
      cassandra:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      cqlsh cassandra -e "CREATE KEYSPACE IF NOT EXISTS distcomp WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};"
    restart: "no"
