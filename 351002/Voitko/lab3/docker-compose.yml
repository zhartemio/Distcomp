# Вариант ask330: Postgres (publisher) + Cassandra (discussion).
services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-distcomp-lab3
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: distcomp
    ports:
      - "5432:5432"
    volumes:
      - postgres_lab3_data:/var/lib/postgresql/data
      - ./publisher/db/docker-init-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    restart: unless-stopped

  cassandra:
    image: cassandra:4.1
    container_name: cassandra-distcomp-lab3
    ports:
      - "9042:9042"
    environment:
      JVM_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - cassandra_lab3_data:/var/lib/cassandra
    restart: unless-stopped

volumes:
  postgres_lab3_data:
  cassandra_lab3_data:
