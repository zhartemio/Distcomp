services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - kafkanet

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - kafkanet
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: distcomp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d distcomp"]
      interval: 3s
      timeout: 3s
      retries: 20
    networks:
      - kafkanet

  cassandra:
    image: cassandra:4.1
    ports:
      - "9042:9042"
    environment:
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 256M
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -E '^UN'"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks:
      - kafkanet

  discussion:
    build: ./discussion
    environment:
      CASSANDRA_HOSTS: cassandra
      CASSANDRA_PORT: "9042"
      MESSAGE_DEFAULT_COUNTRY: BY
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_IN_TOPIC: InTopic
      KAFKA_OUT_TOPIC: OutTopic
    ports:
      - "24130:24130"
    depends_on:
      cassandra:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:24130/api/v1.0/health', timeout=5).read()",
        ]
      interval: 5s
      timeout: 8s
      retries: 24
      start_period: 45s
    networks:
      - kafkanet

  publisher:
    build: ./publisher
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/distcomp
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_IN_TOPIC: InTopic
      KAFKA_OUT_TOPIC: OutTopic
      KAFKA_RPC_TIMEOUT_SEC: "20"
    ports:
      - "24110:24110"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discussion:
        condition: service_healthy
    networks:
      - kafkanet

networks:
  kafkanet:
    driver: bridge
