services:
  postgres:
    image: postgres:16
    container_name: publisher-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: distcomp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d distcomp"]
      interval: 5s
      timeout: 5s
      retries: 10

  liquibase:
    image: liquibase/liquibase:4.27
    container_name: publisher-liquibase
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/changelog:/liquibase/changelog
    command:
      - --url=jdbc:postgresql://postgres:5432/distcomp
      - --username=postgres
      - --password=postgres
      - --changeLogFile=changelog/db.changelog-master.xml
      - update

