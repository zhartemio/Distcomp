services:
  distcomp_kafka_postgres:
    image: postgres:latest
    container_name: distcomp_kafka_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=postgres

  distcomp_kafka_cassandra:
    image: cassandra:latest
    container_name: distcomp_kafka_cassandra
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_SEEDS=distcomp_kafka_cassandra
      - CASSANDRA_CLUSTER_NAME=distcomp
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
      - CASSANDRA_NUM_TOKENS=16

  distcomp_kafka_zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: distcomp_kafka_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  distcomp_kafka_kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: distcomp_kafka_kafka
    depends_on:
      - distcomp_kafka_zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: distcomp_kafka_zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://distcomp_kafka_kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
