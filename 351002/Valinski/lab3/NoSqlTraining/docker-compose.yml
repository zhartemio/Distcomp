services:
  distcomp_sql:
    image: postgres:latest
    container_name: distcomp_sql_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=postgres

  distcomp_nosql:
    image: cassandra:latest
    container_name: distcomp_nosql_cassandra
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_SEEDS=distcomp_nosql
      - CASSANDRA_CLUSTER_NAME=distcomp
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
      - CASSANDRA_NUM_TOKENS=16
