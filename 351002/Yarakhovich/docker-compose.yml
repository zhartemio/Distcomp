services:
  #[JPA/Postgres]
  postgres:
    image: postgres:latest
    container_name: distcomp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: distcomp
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    profiles:
      - lab2
      - lab3
      - lab4
      - lab5
      - lab6

  #[noSql]
  cassandra:
    image: cassandra:latest
    container_name: distcomp-cassandra
    ports:
      - "9042:9042"
    environment:
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=128M
      - CASSANDRA_CLUSTER_NAME=distcomtp
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    profiles:
      - lab3
      - lab4
      - lab5
      - lab6

    #[Kafka]
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: distcomp-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    profiles:
      - lab4
      - lab5
      - lab6
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: distcomp-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    profiles:
      - lab4
      - lab5
      - lab6
  
  #[Redis]
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    profiles:
      - lab5
      - lab6
