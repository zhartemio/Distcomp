server.port=24130
spring.application.name=discussion

# Cassandra
spring.cassandra.contact-points=127.0.0.1
spring.cassandra.port=9042
spring.cassandra.local-datacenter=datacenter1
spring.cassandra.keyspace-name=distcomp
spring.cassandra.schema-action=NONE

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=discussion-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# ?????: ??? ????????? ???????????, ??? Kafka ?????? ??? DTO ?????
spring.kafka.consumer.properties.spring.json.trusted.packages=by.bsuir.distcomp.dto.*
spring.kafka.consumer.properties.spring.json.value.default.type=by.bsuir.distcomp.dto.reaction.ReactionKafkaRequest

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

app.kafka.in-topic=InTopic
app.kafka.out-topic=OutTopic
app.kafka.group-id=discussion-group