server.port=24110

# ????????? PostgreSQL (?????? publisher)
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ????????? JPA ? Liquibase
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# ????????? Redis (??????????? - Task 350)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis

# ????????? Kafka (????????? - Task 340)
spring.kafka.bootstrap-servers=localhost:9092
# ?????? ???????????? ??? ????????? ???????
spring.kafka.consumer.group-id=publisher-reply-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
# ????????? ?????????????? DTO ?? ?????? ??????
spring.kafka.consumer.properties.spring.json.trusted.packages=by.bsuir.distcomp.dto.*

# ????????? ?????????
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ???????? ??????? ?? ???????
app.kafka.in-topic=InTopic
app.kafka.out-topic=OutTopic

# ????????????? ?????????? (?????)
discussion.transport=kafka
discussion.base-url=http://localhost:24130