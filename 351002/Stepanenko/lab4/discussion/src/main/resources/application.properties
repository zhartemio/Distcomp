server.port=24130
spring.application.name=discussion

# Cassandra: 127.0.0.1 вместо localhost — один адрес, без путаницы IPv4/IPv6 и WARN про DC
spring.cassandra.contact-points=127.0.0.1
spring.cassandra.port=9042
spring.cassandra.local-datacenter=datacenter1
spring.cassandra.keyspace-name=distcomp
spring.cassandra.schema-action=NONE
spring.cassandra.request.timeout=10s

# Liquibase + JDBC Cassandra
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.url=jdbc:cassandra://127.0.0.1:9042/distcomp?compliancemode=Liquibase&localdatacenter=datacenter1
spring.liquibase.driver-class-name=com.ing.data.cassandra.jdbc.CassandraDriver
spring.liquibase.enabled=true