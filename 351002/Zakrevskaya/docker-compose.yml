version: '3.8'
services:
  # База для пользователей и статей
  postgres-db:
    image: postgres:15
    container_name: postgres-distcom
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: distcomp
    ports:
      - "5432:5432"

  # База для уведомлений (Notice)
  cassandra-db:
    image: cassandra:latest
    container_name: cassandra-distcom
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=distcomp_cluster