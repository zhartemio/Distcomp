kafka:
  topics:
    auto-create: true
    default-config:
      partitions: 3
      replication-factor: 1
    mapping:
      IN_TOPIC:
        name: InTopic
        partitions: 3
        replication-factor: 1
        configs:
          retention.ms: 604800000
      OUT_TOPIC:
        name: OutTopic
        partitions: 3
        replication-factor: 1
        configs:
          retention.ms: 604800000

cassandra:
  contact-points: localhost
  port: 9042
  keyspace: distcomp
  local-datacenter: datacenter1
  username: root
  password: distcomp

spring:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: note-service-group
      auto-offset-reset: earliest
      enable-auto-commit: false
    producer:
      acks: all
      retries: 3
  autoconfigure:
    exclude: org.springframework.boot.r2dbc.autoconfigure.R2dbcAutoConfiguration
  data:
    r2dbc:
      repositories:
        enabled: false
  cassandra:
    contact-points: ${cassandra.contact-points}
    port: ${cassandra.port}
    keyspace-name: ${cassandra.keyspace}
    local-datacenter: ${cassandra.local-datacenter}
    username: ${cassandra.username}
    password: ${cassandra.password}

server:
  port: 24130
