services:
  postgres:
    image: postgres:16-alpine
    container_name: task350-postgres
    environment:
      POSTGRES_DB: task350
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54350:5432"
    volumes:
      - task350-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  postgres-init:
    image: postgres:16-alpine
    container_name: task350-postgres-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - >
        until pg_isready -h postgres -U postgres -d postgres >/dev/null 2>&1;
        do echo "Waiting for PostgreSQL task350..."; sleep 3; done;
        if ! psql -h postgres -U postgres -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = 'task350'" | grep -q 1;
        then
          psql -h postgres -U postgres -d postgres -c "CREATE DATABASE task350";
        fi;
        psql -h postgres -U postgres -d postgres -c "\l task350"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: task350-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "21850:2181"
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 30 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 10s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: task350-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "19092:9092"
      - "29050:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:19092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  cassandra:
    image: cassandra:5.0
    container_name: task350-cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: task350-cluster
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    ports:
      - "29042:9042"
    volumes:
      - task350-cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh localhost 9042 -e \"DESCRIBE KEYSPACES\" >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s

  cassandra-init:
    image: cassandra:5.0
    container_name: task350-cassandra-init
    depends_on:
      cassandra:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - >
        until cqlsh cassandra 9042 -e "DESCRIBE KEYSPACES" >/dev/null 2>&1;
        do echo "Waiting for Cassandra task350..."; sleep 10; done;
        cqlsh cassandra 9042 -e "CREATE KEYSPACE IF NOT EXISTS task350 WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};";
        cqlsh cassandra 9042 -e "DESCRIBE KEYSPACE task350;"

  redis:
    image: redis:7-alpine
    container_name: task350-redis
    ports:
      - "63750:6379"
    volumes:
      - task350-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  task350-postgres-data:
  task350-cassandra-data:
  task350-redis-data:
