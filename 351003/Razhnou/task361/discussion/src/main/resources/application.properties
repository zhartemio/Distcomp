server.port=24130

spring.cassandra.contact-points=${CASSANDRA_CONTACT_POINTS:localhost}
spring.cassandra.port=${CASSANDRA_PORT:9042}
spring.cassandra.keyspace-name=${CASSANDRA_KEYSPACE:task361}
spring.cassandra.local-datacenter=datacenter1
spring.cassandra.schema-action=none

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=task361-discussion
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.jackson.serialization.write-dates-as-timestamps=false

app.kafka.reaction.in-topic=task361.InTopic
app.kafka.reaction.out-topic=task361.OutTopic
app.jwt.secret=task361-jwt-secret-task361-jwt-secret-1234567890
