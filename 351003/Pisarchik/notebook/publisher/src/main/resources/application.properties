spring.application.name=notebook
server.port=24110

spring.datasource.url=jdbc:postgresql://localhost:5432/distcomp
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.default_schema=distcomp
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

discussion.base-url=http://localhost:24130
discussion.transport=kafka

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=publisher-notice-out
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=1
spring.kafka.producer.linger-ms=5
spring.kafka.producer.batch-size=32768
spring.kafka.producer.buffer-memory=33554432

kafka.topic.in-topic=InTopic
kafka.topic.out-topic=OutTopic
kafka.sync.reply-timeout-ms=1000

spring.data.redis.host=localhost
spring.data.redis.port=6379

app.jwt.secret=notebook-dev-hs256-secret-please-change-32b-minimum
app.jwt.expiration-ms=86400000
