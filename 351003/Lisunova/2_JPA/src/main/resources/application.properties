server.port=24110
spring.main.banner-mode=off

# spring.datasource.url=jdbc:postgresql://localhost:5432/forum
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=distcomp

spring.liquibase.default-schema=distcomp
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.xml

# ???????? ???????? ??? ?????? ?????
spring.datasource.url=jdbc:postgresql://localhost:5432/distcomp?currentSchema=distcomp

# ???????? ????????? ??? Hibernate
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ???????? ????????? ??? Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.fail-on-empty-beans=false

