databaseChangeLog:
  - changeSet:
      id: 1
      author: you
      changes:
        - sql:
            sql: |
              CREATE KEYSPACE IF NOT EXISTS distcomp
              WITH replication = {
                'class': 'SimpleStrategy',
                'replication_factor': 1
              };

  - changeSet:
      id: 2
      author: you
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS distcomp.tbl_comment (
                  topic_id bigint,
                  id bigint,
                  content text,
                  status text,
                  PRIMARY KEY ((topic_id), id)
              );
