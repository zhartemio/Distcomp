services:
  postgres:
    container_name: distcomp.postgres
    image: "postgres:17-alpine"
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT}:5432"
    env_file:
      - .env
    volumes:
      - distcomp.postgres.data:/var/lib/postgresql/data:rw
    networks:
      - distcomp.network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 60s
      retries: 5
      start_period: 10s

  cassandra:
    image: cassandra:latest
    ports:
      - "9042:9042"
    networks:
      - distcomp.network
    volumes:
      - distcomp.cassandra.data:/var/lib/cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: MyLocalCluster

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    ports:
      - "2181:2181"
    networks:
      - distcomp.network
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - distcomp.network

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    networks:
      - distcomp.network
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

volumes:
  distcomp.postgres.data:
    name: distcomp.postgres.data
  distcomp.cassandra.data:
    name: distcomp.cassandra.data

networks:
  distcomp.network:
    name: distcomp.network

  