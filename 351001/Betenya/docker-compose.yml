version: '3.8'

services:

  # ── Databases ──────────────────────────────────────────────────────────────

  postgres:
    image: postgres:15
    container_name: postgres-distcomp
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: distcomp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d distcomp"]
      interval: 10s
      timeout: 5s
      retries: 5

  cassandra:
    image: cassandra:4
    container_name: cassandra-distcomp
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: distcomp
      CASSANDRA_DC: datacenter1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  redis:
    image: redis:7
    container_name: redis-distcomp
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ─────────────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper-distcomp
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-distcomp
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Microservices ──────────────────────────────────────────────────────────

  discussion:
    build:
      context: ./discussion
      dockerfile: Dockerfile
    container_name: discussion-distcomp
    ports:
      - "24130:24130"
    environment:
      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: "9042"
      KAFKA_BROKER: kafka:29092
    depends_on:
      cassandra:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  publisher:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: publisher-distcomp
    ports:
      - "24110:24110"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/distcomp?schema=distcomp
      DISCUSSION_URL: http://discussion:24130
      KAFKA_BROKER: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      PORT: "24110"
    depends_on:
      postgres:
        condition: service_healthy
      discussion:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-distcomp
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:24110/api
    depends_on:
      - publisher
    restart: unless-stopped

volumes:
  postgres_data:
  cassandra_data:
