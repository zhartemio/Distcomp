services:
  postgres:
    container_name: postgres_container_rv1
    image: postgres:14
    shm_size: 1gb
    command: postgres -c 'max_connections=500'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /data/postgres
    volumes:
      - postgres:/data/postgres
    ports:
      - "5432:5432"
    networks:
      - backend
    restart: unless-stopped

  cassandra:
    container_name: cassandra_container_rv1
    image: cassandra:4.1
    environment:
      CASSANDRA_CLUSTER_NAME: 'MyCluster'
      CASSANDRA_SEEDS: cassandra
      CASSANDRA_DC: datacenter1
      CASSANDRA_LISTEN_ADDRESS: auto
      CASSANDRA_BROADCAST_ADDRESS: auto
      CASSANDRA_RPC_ADDRESS: 0.0.0.0
      CASSANDRA_BROADCAST_RPC_ADDRESS: 127.0.0.1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_NUM_TOKENS: 256
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 100M
    ports:
      - "9042:9042"
    volumes:
      - cassandra:/var/lib/cassandra/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "cqlsh", "-e", "describe keyspaces;" ]
      interval: 30s
      timeout: 10s
      retries: 5
    command: >-
      bash -c "sleep 30 &&
      sed -ri 's/^rpc_address:.*/rpc_address: 0.0.0.0/' /etc/cassandra/cassandra.yaml &&
      if grep -q '^broadcast_rpc_address:' /etc/cassandra/cassandra.yaml; then
      sed -ri 's/^broadcast_rpc_address:.*/broadcast_rpc_address: 127.0.0.1/' /etc/cassandra/cassandra.yaml;
      else
      sed -ri '/^rpc_address:/a broadcast_rpc_address: 127.0.0.1' /etc/cassandra/cassandra.yaml;
      fi &&
      cassandra -f -R"

  zookeeper:
    container_name: zookeeper_container_rv1
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - backend
    restart: unless-stopped

  kafka:
    container_name: kafka_container_rv1
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - backend
    restart: unless-stopped

  pgadmin:
    container_name: pgadmin_container_rv1
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgaadmin4@pgadmin.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - backend
    restart: unless-stopped

  rabbitmq:
    container_name: rabbitmq_container_rv1
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq:/var/lib/rabbitmq
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    container_name: redis_container_rv1
    image: redis:alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    driver: bridge

volumes:
  postgres:
  pgadmin:
  rabbitmq:
  redis_data:
  cassandra:
