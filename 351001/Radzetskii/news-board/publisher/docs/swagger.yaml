basePath: /api/v1.0
definitions:
  dto.ErrorResponse:
    properties:
      errorCode:
        example: "40401"
        type: string
      errorMessage:
        example: User not found
        type: string
    type: object
  dto.MarkerRequestTo:
    properties:
      name:
        example: urgent
        maxLength: 32
        minLength: 2
        type: string
    required:
    - name
    type: object
  dto.MarkerResponseTo:
    properties:
      id:
        example: 1
        type: integer
      name:
        example: urgent
        type: string
    type: object
  dto.NewsRequestTo:
    properties:
      content:
        example: Some important content here...
        maxLength: 2048
        minLength: 4
        type: string
      markers:
        example:
        - red
        - green
        - blue
        items:
          type: string
        type: array
      title:
        example: Breaking News
        maxLength: 64
        minLength: 2
        type: string
      userId:
        example: 1
        minimum: 1
        type: integer
    required:
    - content
    - title
    - userId
    type: object
  dto.NewsResponseTo:
    properties:
      content:
        example: Some important content here...
        type: string
      created:
        example: "2023-01-01T00:00:00Z"
        type: string
      id:
        example: 1
        type: integer
      modified:
        example: "2023-01-01T00:00:00Z"
        type: string
      title:
        example: Breaking News
        type: string
      userId:
        example: 1
        type: integer
    type: object
  dto.NoticeRequestTo:
    properties:
      content:
        example: This is a notice.
        maxLength: 2048
        minLength: 2
        type: string
      newsId:
        example: 1
        minimum: 1
        type: integer
    required:
    - content
    - newsId
    type: object
  dto.NoticeResponseTo:
    properties:
      content:
        example: This is a notice.
        type: string
      id:
        example: 1
        type: integer
      newsId:
        example: 1
        type: integer
    type: object
  dto.UserRequestTo:
    properties:
      firstname:
        example: John
        maxLength: 64
        minLength: 2
        type: string
      lastname:
        example: Doe
        maxLength: 64
        minLength: 2
        type: string
      login:
        example: john_doe
        maxLength: 64
        minLength: 2
        type: string
      password:
        example: securePass123
        maxLength: 128
        minLength: 8
        type: string
    required:
    - firstname
    - lastname
    - login
    - password
    type: object
  dto.UserResponseTo:
    properties:
      firstname:
        example: John
        type: string
      id:
        example: 1
        type: integer
      lastname:
        example: Doe
        type: string
      login:
        example: john_doe
        type: string
    type: object
