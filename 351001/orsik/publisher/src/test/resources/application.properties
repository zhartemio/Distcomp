# Tests: avoid requiring Redis; use Boot simple cache (ConcurrentMapCacheManager).
spring.cache.type=simple
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Self-contained DB for @SpringBootTest (no local Postgres required)
spring.datasource.url=jdbc:h2:mem:distcomp;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.liquibase.enabled=false
