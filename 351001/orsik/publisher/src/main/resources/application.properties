spring.application.name=orsik
server.address=localhost
server.port=24110

spring.datasource.url=jdbc:postgresql://localhost:5432/distcomp
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.liquibase-schema=public
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG
spring.jackson.mapper.allow-coercion-of-scalars=false
spring.jackson.generator.write-numbers-as-strings=false

# discussion module (Cassandra) — REST integration
discussion.base-url=http://localhost:24130

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=publisher-comments
kafka.topic.in=InTopic
kafka.topic.out=OutTopic

# Redis (cache)
spring.data.redis.host=localhost
spring.data.redis.port=6379
cache.ttl-seconds=300
