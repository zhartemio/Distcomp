spring.application.name=discussion
server.address=localhost
server.port=24130

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=discussion-comments
kafka.topic.in=InTopic
kafka.topic.out=OutTopic

spring.cassandra.keyspace-name=distcomp
spring.cassandra.contact-points=localhost
spring.cassandra.port=9042
spring.cassandra.local-datacenter=datacenter1
spring.cassandra.schema-action=none

spring.liquibase.enabled=false
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.url=jdbc:cassandra://localhost:9042?localdatacenter=datacenter1
spring.liquibase.driver-class-name=com.ing.data.cassandra.jdbc.CassandraDriver

publisher.base-url=http://localhost:24110

discussion.moderation.stop-words=spam,offensive,blocked

logging.level.org.springframework.data.cassandra=INFO
# Java driver: в Docker/Alpine часто нет native clock; INFO про prepared statements шумит на каждом запросе
logging.level.com.datastax.oss.driver.internal=WARN
