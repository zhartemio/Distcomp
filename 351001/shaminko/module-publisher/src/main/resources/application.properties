spring.application.name=DistComp
server.port = 24110

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/distcomp}
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.liquibase.change-log=classpath:/db/changelog/postgres-changelog.yaml

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.admin.close-timeout=1

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=6379
spring.data.redis.database=0

app.discussion.url=${DISCUSSION_URL:http://localhost:24130}

# Security (v2.0 API)
# NOTE: secret must be at least 32 bytes for HS256.
app.security.jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me-32b}
app.security.jwt.expirationSeconds=${JWT_EXPIRATION_SECONDS:3600}
