version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: distcomp_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: distcomp
    ports:
      - "5432:5432"

  cassandra_db:
    image: cassandra:4.1
    container_name: distcomp_cassandra
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_RPC_ADDRESS=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "nodetool status"]
      interval: 20s
      timeout: 10s
      retries: 5

volumes:
  postgres_data: