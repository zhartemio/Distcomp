services:
  db:
    image: postgres:17
    container_name: distcomp_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: distcomp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d distcomp"]
      interval: 5s
      timeout: 5s
      retries: 5

  cassandra:
      image: cassandra:4.1
      container_name: distcomp_cassandra
      restart: always
      ports:
        - "9042:9042"
      environment:
        - CASSANDRA_CLUSTER_NAME=DiscussionCluster
      healthcheck:
        test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' || exit 1"]
        interval: 15s
        timeout: 10s
        retries: 5
        start_period: 90s

  publisher:
    build: ./publisher
    container_name: distcomp_publisher
    restart: always
    ports:
      - "24110:24110"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: distcomp
      DISCUSSION_SERVICE_URL: http://discussion:24130/api/v1.0/posts
    depends_on:
      db:
        condition: service_healthy

  discussion:
    build: ./discussion
    container_name: distcomp_discussion
    restart: always
    ports:
      - "24130:24130"
    environment:
      CASSANDRA_HOST: cassandra
    depends_on:
      cassandra:
        condition: service_healthy